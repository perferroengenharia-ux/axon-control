[platformio]
default_envs = esp32-s3-devkitc-1

; Projeto PlatformIO + ESP-IDF para a IHM baseada em ESP32-S3-WROOM-1.
; Ajustes comuns para PCB custom:
; - Flash size / PSRAM: ajuste em board_build.flash_mode, board_build.f_flash e sdkconfig.defaults.
; - Particoes: altere board_build.partitions para outro CSV se precisar de mais OTA / storage.
; - Upload speed / monitor speed: ajuste upload_speed e monitor_speed conforme seu adaptador USB-UART.
; - Certificados TLS: edite include/certs.h com o PEM real do broker / OTA HTTPS.
; - Credenciais default de teste: ajuste em include/app_config.h ou salve via NVS em runtime.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
upload_speed = 921600
monitor_filters = colorize, time
board_build.partitions = partitions.csv
board_build.flash_mode = qio
build_flags =
    -DAPP_FIRMWARE_VERSION=\"0.1.0\"
    -DLOG_LOCAL_LEVEL=ESP_LOG_INFO

